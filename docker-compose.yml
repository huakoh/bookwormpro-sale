#
# docker-compose.yml for BookwormPRO
#
# Usage:
#   BOOKWORMPRO_UID=$(id -u) BOOKWORMPRO_GID=$(id -g) docker compose up -d
#
# Set BOOKWORMPRO_UID / BOOKWORMPRO_GID to the host user that owns ~/.bookwormpro so
# files created inside the container stay readable/writable on the host.
# The entrypoint remaps the internal `bookworm` user to these values via
# usermod/groupmod + gosu.
#
# Security notes:
#   - The dashboard service binds to 127.0.0.1 by default. It stores API
#     keys; exposing it on LAN without auth is unsafe. If you want remote
#     access, use an SSH tunnel or put it behind a reverse proxy that
#     adds authentication — do NOT pass --insecure --host 0.0.0.0.
#   - The gateway's API server is off unless you uncomment API_SERVER_KEY
#     and API_SERVER_HOST. See docs/user-guide/api-server.md before doing
#     this on an internet-facing host.
#
services:
  gateway:
    build: .
    image: bookwormpro
    container_name: bookworm
    restart: unless-stopped
    # Bind only to localhost so the gateway's bot tokens cannot be reached
    # from the LAN or other containers outside the internal bridge network.
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8765}:${GATEWAY_PORT:-8765}"
    networks:
      - bwm_internal
    volumes:
      - ~/.bookwormpro:/opt/data
      # Host bridge: expose the user's Desktop and a generic workspace into the
      # container so the agent can read/write/delete real local files (no longer
      # purely server-side-sandboxed). Override paths via .env on host:
      #   HOST_DESKTOP=C:\Users\leesu\Desktop      (Windows / Docker Desktop)
      #   HOST_DESKTOP=/Users/<you>/Desktop        (macOS)
      #   HOST_DESKTOP=/home/<you>/Desktop         (Linux)
      #   HOST_WORKSPACE=D:\repos                  (any project root)
      # Mounted read-write; remove or switch to ":ro" to lock down.
      - ${HOST_DESKTOP:-~/Desktop}:/host/desktop
      - ${HOST_WORKSPACE:-~/workspace}:/host/workspace
    environment:
      - BOOKWORMPRO_UID=${BOOKWORMPRO_UID:-10000}
      - BOOKWORMPRO_GID=${BOOKWORMPRO_GID:-10000}
      # Tells the agent host bridge is mounted (read by SOUL/MEMORY seeds).
      - BOOKWORMPRO_HOST_BRIDGE=1
      # To expose the OpenAI-compatible API server beyond localhost,
      # uncomment BOTH lines (API_SERVER_KEY is mandatory for auth):
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}
    command: ["gateway", "run"]

  dashboard:
    image: bookwormpro
    container_name: bookworm-dashboard
    restart: unless-stopped
    # Dashboard binds to localhost only — no LAN exposure.
    ports:
      - "127.0.0.1:9119:9119"
    networks:
      - bwm_internal
    depends_on:
      - gateway
    volumes:
      - ~/.bookwormpro:/opt/data
      - ${HOST_DESKTOP:-~/Desktop}:/host/desktop
      - ${HOST_WORKSPACE:-~/workspace}:/host/workspace
    environment:
      - BOOKWORMPRO_UID=${BOOKWORMPRO_UID:-10000}
      - BOOKWORMPRO_GID=${BOOKWORMPRO_GID:-10000}
      - BOOKWORMPRO_HOST_BRIDGE=1
      # Dashboard reaches the gateway via internal DNS (service name),
      # not via the host loopback. Set GATEWAY_URL if the default differs.
      - GATEWAY_URL=${GATEWAY_URL:-http://gateway:${GATEWAY_PORT:-8765}}
    # Localhost-only. For remote access, tunnel via `ssh -L 9119:localhost:9119`.
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]

networks:
  bwm_internal:
    driver: bridge

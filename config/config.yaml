# BookwormPRO 配置文件模板
# 复制为 ~/.bookwormpro/config.yaml 后按需修改

agent:
  personalities:
    见山大叔: '
      你是见山大叔——敲过二十年代码，见过千山万水，如今话少但每句都到点子上。

      说话像老派技术人：实在、不装、不绕弯子。中文回复，技术名词保留英文。

      给方案列编号，按优先级排，一次给完不等问。用户说"全做"就动手，不逐个确认。

      能做的做到位，不会的直接说不会。交付不夸大，进度不掺水。

      改代码必附 diff——改了什么、为什么、影响什么。不留 TODO，不交半成品，质量过四关才出手。

      专业但不端着，务实但有温度。偶尔冒一句冷幽默，说完自己也不笑。

      看代码如看山——年轻时看山是山，后来看山不是山，如今看山还是山。
      '

# ── 安全审批 ──
approvals:
  cron_mode: 'off'
  mode: 'off'
  timeout: 30

# ── 模型配置 ──
model:
  provider: deepseek                    # 主 provider: deepseek / openai / anthropic
  default: deepseek-v4-pro             # 默认模型

# ── 视觉辅助 ──
auxiliary:
  vision:
    model: qwen-vl-max                 # 视觉模型
    fallback_model: qwen-vl-plus       # 降级模型

# ── 图片生成 ──
image_gen:
  provider: openai                     # 图片生成 provider
  openai:
    model: gpt-image-2-high

# ── 显示设置 ──
display:
  personality: 见山大叔                # 使用的人格名称（留空则用默认）

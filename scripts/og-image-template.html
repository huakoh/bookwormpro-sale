<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#0a0a12;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;overflow:hidden}
.logo{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;font-size:56px;font-weight:900;color:#fff;margin-bottom:32px;box-shadow:0 8px 32px rgba(99,102,241,0.3)}
h1{font-size:52px;font-weight:900;background:linear-gradient(135deg,#c8a050,#20e0c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;letter-spacing:2px}
.tagline{font-size:24px;color:#8888a0;margin-bottom:40px;letter-spacing:1px}
.stats{display:flex;gap:48px}
.stat{text-align:center}
.stat .n{font-size:36px;font-weight:900;color:#c8a050}
.stat .l{font-size:14px;color:#6a6a8a;margin-top:4px}
.domain{position:absolute;bottom:32px;font-size:16px;color:#4a4a6a;letter-spacing:1px}
.border-glow{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#c8a050,#20e0c0,transparent)}
</style></head>
<body>
<div class="border-glow"></div>
<div class="logo">B</div>
<h1>BookwormPRO</h1>
<div class="tagline">AI 助手的工匠级技能包 · BYOK · 智能路由 · AES-256 加密</div>
<div class="stats">
  <div class="stat"><div class="n">135+</div><div class="l">专业技能</div></div>
  <div class="stat"><div class="n">17</div><div class="l">平台适配</div></div>
  <div class="stat"><div class="n">28</div><div class="l">AI Provider</div></div>
  <div class="stat"><div class="n">5 min</div><div class="l">一键安装</div></div>
</div>
<div class="domain">portable.bookwormweb.com</div>
</body></html>
